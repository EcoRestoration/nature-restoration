# SITE SETTINGS
title: Peatland restoration guidelines
author: EcoRestoration
baseurl: "/nature-restoration"
url: "https://EcoRestoration.github.io"

# THEME SETTINGS
logo: /assets/images/created_logo.png

# BUILD SETTINGS
repository: EcoRestoration/nature-restoration
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-remote-theme

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - LICENSE

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: "_pages"
    values:
      layout: base
  - scope:
      path: "_pages/home"
    values:
      layout: home
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "_pages/peatlands"
    values:
      toc: true

